<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#5B8CFF"/>
    </linearGradient>
  </defs>

  <!-- Center -->
  <circle cx="64" cy="64" r="13" fill="url(#orbitGradient)"/>

  <!-- Orbit -->
  <circle
    cx="64"
    cy="64"
    r="40"
    fill="none"
    stroke="url(#orbitGradient)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-dasharray="215 36"
    transform="rotate(-35 64 64)"
  />

  <!-- Satellite -->
  <circle
    cx="92"
    cy="35"
    r="6"
    fill="#ffffff"
    stroke="url(#orbitGradient)"
    stroke-width="2"
  />
</svg>